openapi: 3.0.0
info:
  title: Bybit Ticker & Trading API
  description: |
    API for fetching crypto market data and executing automated trades on Bybit.
    
    Created by **Devotts** to assist with personal trade automations. 
    Feel free to contribute: [github.com/devotts](https://github.com/devotts)
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        details:
          type: string

security:
  - {}

paths:
  /health:
    get:
      summary: Health Check
      description: Returns server status
      responses:
        '200':
          description: Server is Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/bybit:
    get:
      summary: Get Ticker Data
      description: Fetch real-time ticker data for a symbol.
      parameters:
        - in: query
          name: symbol
          required: true
          schema:
            type: string
          description: Trading symbol (e.g. BTCUSDT)
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  retCode:
                    type: integer
                  result:
                    type: object

  /api/bybit/candles:
    get:
      summary: Get Kline (Candle) Data
      parameters:
        - in: query
          name: symbol
          required: true
          schema:
            type: string
        - in: query
          name: interval
          schema:
            type: string
            default: "240"
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Candle data
          content:
            application/json:
              schema:
                type: object

  /api/bybit/stop-sim:
    get:
      summary: Simulate Stop Loss logic
      parameters:
        - in: query
          name: symbol
          required: true
          schema:
            type: string
        - in: query
          name: entryPrice
          required: true
          schema:
            type: number
        - in: query
          name: entryDate
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: direction
          schema:
            type: string
            enum: [LONG, SHORT]
            default: LONG
      responses:
        '200':
          description: Simulation result

  # Authenticated Routes
  /api/trade/risk-analyze:
    post:
      summary: Risk Analyze (V3 — ATR/SL Filter)
      description: |
        Analyzes trade risk before execution using ATR/SL volatility filtering and 14 technical patterns.
        Returns a go/no-go decision. Call this **before** opening a position.

        The primary filter is the ATR/SL ratio — when ATR(14) on 4H candles exceeds 2.5x the stop-loss distance,
        the stop is within normal price noise and the trade should be skipped.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol, direction]
              properties:
                symbol:
                  type: string
                  example: BTCUSDT
                  description: Trading pair
                direction:
                  type: string
                  enum: [LONG, SHORT]
                  description: Trade direction
                entryPrice:
                  type: number
                  description: Optional entry price (defaults to last close)
                  example: 95000
      responses:
        '200':
          description: Risk analysis result
          content:
            application/json:
              schema:
                type: object
                properties:
                  symbol:
                    type: string
                  direction:
                    type: string
                  entryPrice:
                    type: number
                  riskScore:
                    type: integer
                    description: Normalized risk score (0-10). >= 7 means avoid.
                  shouldAvoid:
                    type: boolean
                    description: Primary decision flag. true = skip the trade.
                  atrSlRatio:
                    type: number
                    description: ATR(14) / stop-loss distance. >= 2.5x means stop is noise.
                  riskLevel:
                    type: string
                    enum: [LOW, MEDIUM, HIGH]
                  isBlacklisted:
                    type: boolean
                  detectedPatterns:
                    type: array
                    items:
                      type: object
                  technicalSummary:
                    type: object
                  recommendation:
                    type: string
                  analyzedAt:
                    type: string
                    format: date-time
                  candlesAnalyzed:
                    type: integer
        '400':
          description: Missing or invalid parameters
        '401':
          description: Unauthorized

  /api/trade/validate/{symbol}:
    get:
      summary: Validate Symbol for Trading
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: symbol
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Symbol validation result
        '401':
          description: Unauthorized

  /api/trade/market/{symbol}:
    get:
      summary: Get Real-time Market Data
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: symbol
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Market data with funding rates

  /api/trade/position/{symbol}:
    get:
      summary: Get Active Position
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: symbol
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Position details and PnL

  /api/trade/orders-status/{symbol}:
    get:
      summary: Get Orders Status (Ground Truth)
      description: |
        Returns the full order and position status for a symbol by querying Bybit directly.
        Used by the n8n Schedule workflow as the **ground truth** source, replacing candle-based simulation.

        Fetches active orders, order history (last 7 days), and current position in parallel.
        Classifies TP orders by price distance from entry (TP1-TP4) and computes a `suggestedStatus`.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: symbol
          required: true
          schema:
            type: string
          description: Trading symbol (e.g. POWERUSDT)
      responses:
        '200':
          description: Full orders and position status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  symbol:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  position:
                    type: object
                    properties:
                      exists:
                        type: boolean
                      side:
                        type: string
                        enum: [Buy, Sell]
                      size:
                        type: string
                      entryPrice:
                        type: string
                      markPrice:
                        type: string
                      unrealisedPnl:
                        type: string
                      leverage:
                        type: string
                      liquidationPrice:
                        type: string
                      positionStatus:
                        type: string
                  orders:
                    type: object
                    properties:
                      active:
                        type: array
                        items:
                          type: object
                      filled:
                        type: array
                        items:
                          type: object
                      cancelled:
                        type: array
                        items:
                          type: object
                  summary:
                    type: object
                    properties:
                      hasOpenPosition:
                        type: boolean
                      direction:
                        type: string
                        enum: [LONG, SHORT]
                      totalOrders:
                        type: integer
                      activeOrders:
                        type: integer
                      filledOrders:
                        type: integer
                      cancelledOrders:
                        type: integer
                      stopLoss:
                        type: object
                        nullable: true
                      takeProfits:
                        type: object
                        description: "TP1-TP4 keyed by label, sorted by distance from entry"
                      tpProgress:
                        type: string
                        description: "Filled TPs / Total TPs (e.g. '1/4')"
                        example: "1/4"
                      suggestedStatus:
                        type: string
                        enum: [OPEN, PARTIAL, STOPPED, CLOSED]
                        description: "OPEN = nothing filled, PARTIAL = some TPs hit, STOPPED = SL triggered, CLOSED = position gone"
        '401':
          description: Unauthorized
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string

  /api/trade/open:
    post:
      summary: Open Position (SP20 Strategy)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol, direction, margin]
              properties:
                symbol:
                  type: string
                  example: BTCUSDT
                direction:
                  type: string
                  enum: [LONG, SHORT]
                margin:
                  type: number
                  description: Margin in USDT
                  example: 100
                leverage:
                  type: number
                  default: 20
      responses:
        '200':
          description: Order execution result
        '400':
          description: Insufficient balance or invalid parameters

  /api/trade/close:
    post:
      summary: Close Position
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol]
              properties:
                symbol:
                  type: string
      responses:
        '200':
          description: Close result
